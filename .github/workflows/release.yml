name: Release

on:
  release:
    types: [published]

jobs:
  build-mcpb:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: astral-sh/setup-uv@v5

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Sync dependencies
        run: uv sync

      - name: Sync manifest version with pyproject.toml
        run: |
          python << 'EOF'
          import json
          import tomllib

          # Read version from pyproject.toml
          with open('pyproject.toml', 'rb') as f:
              version = tomllib.load(f)['project']['version']

          # Update manifest.json
          with open('manifest.json', 'r') as f:
              manifest = json.load(f)

          manifest['version'] = version

          with open('manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)

          print(f"Synced manifest.json version to {version}")
          EOF

      - name: Pack .mcpb bundle
        run: mcpb pack

      - name: Upload .mcpb to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" *.mcpb --clobber
